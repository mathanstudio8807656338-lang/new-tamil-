<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A1 Premium Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-soft: #eff6ff;
            --accent: #f43f5e;
            --success: #10b981;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #f1f5f9;
        }

        * { 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Outfit', sans-serif;
        }

        body {
            background: var(--bg);
            margin: 0;
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Premium App Header */
        header {
            background: white;
            padding: 0.75rem 1.2rem;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .brand-box { display: flex; flex-direction: column; }
        .brand-box h1 { font-size: 1rem; margin: 0; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .brand-box span { font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .user-profile {
            background: var(--primary-soft);
            width: 36px; height: 36px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: var(--primary); font-size: 0.9rem;
        }

        /* Content Container */
        .app-content {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            scrollbar-width: none;
        }
        .app-content::-webkit-scrollbar { display: none; }

        /* Greet Section */
        .greet-card {
            margin-bottom: 1.25rem;
        }
        .greet-card h2 { font-size: 1.3rem; margin: 0; font-weight: 900; color: var(--text-main); }
        .greet-card p { margin: 0.2rem 0 0; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; }

        /* Special Highlight */
        .special-chip {
            background: linear-gradient(135deg, #f43f5e, #fb7185);
            color: white;
            padding: 0.4rem 0.8rem;
            border-radius: 0.75rem;
            font-size: 0.75rem;
            font-weight: 800;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 1rem;
            box-shadow: 0 4px 10px rgba(244, 63, 94, 0.2);
        }

        /* Status Row */
        .status-row {
            display: flex;
            gap: 0.6rem;
            margin-bottom: 1.25rem;
        }
        .status-item {
            flex: 1;
            background: white;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }
        .status-item .label { font-size: 0.6rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.2rem; }
        .status-item .value { font-size: 0.9rem; font-weight: 800; color: var(--primary); }
        .status-item.highlight .value { color: #b45309; }

        /* Lesson Grid */
        .section-label {
            font-size: 0.75rem;
            font-weight: 800;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
        }

        .lesson-card {
            background: white;
            border-radius: 1.25rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid var(--border);
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
            transition: transform 0.2s;
        }
        .lesson-card:active { transform: scale(0.98); }

        .lesson-header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }
        .lesson-icon-box {
            width: 32px; height: 32px;
            background: var(--primary-soft);
            border-radius: 0.75rem;
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; color: var(--primary); font-size: 0.8rem;
        }
        .lesson-title { font-weight: 800; font-size: 0.95rem; color: var(--text-main); line-height: 1.3; }

        .lesson-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.6rem;
        }

        .action-btn {
            padding: 0.7rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.75rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            transition: 0.2s;
        }

        .btn-notes { background: #f1f5f9; color: #475569; }
        .btn-exam { background: var(--primary); color: white; }
        .btn-locked { background: #fafafa; color: #cbd5e1; border: 1px dashed #e2e8f0; cursor: not-allowed; }

        /* Loader */
        .loader-box { height: 60vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 30px; height: 30px; border: 3px solid #f1f5f9; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Closed State */
        .closed-box { text-align: center; padding: 3rem 1rem; background: white; border-radius: 1.5rem; }
    </style>
</head>
<body>
    <header>
        <div class="brand-box">
            <h1>A1 TAMIL</h1>
            <span>Primary Edition</span>
        </div>
        <div class="user-profile" id="userInitial">A1</div>
    </header>

    <div class="app-content" id="appBody">
        <div class="loader-box">
            <div class="spinner"></div>
            <p style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted); margin-top: 1rem;">Loading dashboard...</p>
        </div>
    </div>

    <script type="module">
        import { waitForAuth } from './js/auth.js?v=5.0';

        (async () => {
            const body = document.getElementById('appBody');
            const user = await waitForAuth();
            if (user) {
                const initial = user.name ? user.name.charAt(0).toUpperCase() : 'S';
                document.getElementById('userInitial').innerText = initial;
            }

            const v = Date.now();
            try {
                const res = await fetch('1.json?v=' + v);
                const data = await res.json();
                
                const now = new Date();
                const currentMins = now.getHours() * 60 + now.getMinutes();
                const isClosed = currentMins >= 1350 || currentMins < 360;

                if (isClosed || data.status === 'closed') {
                    renderClosed();
                } else {
                    renderDashboard(data, user);
                }
            } catch (err) {
                body.innerHTML = `<div class="closed-box"><h3>Error loading data</h3><p>Please refresh.</p></div>`;
            }
        })();

        function renderDashboard(data, user) {
            const body = document.getElementById('appBody');
            const titles = data.activeTitles || [];
            const subject = data.activeSubject || 'General';
            const grade = data.activeGrade || '5';
            
            const isExamOpen = data.status === 'open';
            const isNotesOpen = data.status === 'notes' || data.status === 'open';

            let html = `
                <div class="greet-card">
                    <h2>வணக்கம், ${user ? (user.name || "மாணவர்") : "மாணவர்"}!</h2>
                    <p>இன்று உங்களுக்காகக் காத்திருக்கும் பாடங்கள்</p>
                </div>

                <div class="special-chip">✨ இன்றைய சிறப்புத் தேர்வு (Live)</div>

                <div class="status-row">
                    <div class="status-item">
                        <span class="label">பாடம்</span>
                        <span class="value">${subject}</span>
                    </div>
                    <div class="status-item highlight">
                        <span class="label">முடிவடைய</span>
                        <span id="timerValue" class="value">--:--:--</span>
                    </div>
                </div>

                <span class="section-label">வகுப்பு: ${grade} - பாடப்பிரிவுகள்</span>
                <div class="lessons-container">
            `;

            titles.forEach((title, idx) => {
                const fileId = data.activeFiles[idx] || '1';
                const cGrade = (data.activeGrades && data.activeGrades[idx]) ? data.activeGrades[idx] : grade;
                
                html += `
                    <div class="lesson-card">
                        <div class="lesson-header">
                            <div class="lesson-icon-box">${idx + 1}</div>
                            <div class="lesson-title">${title}</div>
                        </div>
                        <div class="lesson-actions">
                            ${isNotesOpen ? `
                                <a href="material.html?subject=${subject}&class=${cGrade}&lesson=${fileId}" class="action-btn btn-notes">📖 குறிப்புகள்</a>
                            ` : `<div class="action-btn btn-locked">🔒 Notes</div>`}

                            ${isExamOpen ? `
                                <a href="quiz.html?subject=${subject}&class=${cGrade}&lesson=${fileId}" class="action-btn btn-exam">📝 தேர்வு</a>
                            ` : `<div class="action-btn btn-locked">🔒 Exam at 8PM</div>`}
                        </div>
                    </div>
                `;
            });

            html += `</div>`;
            body.innerHTML = html;
            startTimer();
        }

        function renderClosed() {
            const body = document.getElementById('appBody');
            body.innerHTML = `
                <div class="closed-box">
                    <div style="font-size: 3rem; margin-bottom: 1rem;">🌙</div>
                    <h2 style="font-weight: 900;">அமர்வு முடிந்தது</h2>
                    <p style="color: var(--text-muted); font-size: 0.9rem; font-weight: 600;">மீண்டும் நாளை காலை 6:00 மணிக்குச் சந்திக்கலாம்!</p>
                </div>
            `;
        }

        function startTimer() {
            const el = document.getElementById('timerValue');
            if (!el) return;
            const update = () => {
                const now = new Date();
                const target = new Date();
                target.setHours(22, 30, 0, 0);
                const diff = target - now;
                if (diff <= 0) { el.innerText = "CLOSED"; return; }
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            };
            update();
            setInterval(update, 1000);
        }
    </script>
</body>
</html>
