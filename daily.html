<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - A1 Coaching</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;700;900&display=swap">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --accent: #0ea5e9;
            --success: #10b981;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --glass: rgba(255, 255, 255, 0.8);
            --shadow: 0 4px 20px rgba(0, 0, 0, 0.04);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            color: var(--text-main);
            overflow-x: hidden;
            font-size: 15px;
        }

        .premium-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 200px;
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            z-index: -1;
            border-bottom-left-radius: 2rem;
            border-bottom-right-radius: 2rem;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 1rem;
        }

        header {
            padding: 0.5rem 0 1.5rem;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-greet h1 {
            font-size: 1.25rem;
            margin: 0;
            font-weight: 800;
        }

        .user-greet p {
            margin: 0.1rem 0 0;
            opacity: 0.8;
            font-size: 0.8rem;
        }

        .status-badge {
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
            padding: 0.3rem 0.8rem;
            border-radius: 2rem;
            font-size: 0.7rem;
            font-weight: 800;
            border: 1px solid rgba(255,255,255,0.3);
        }

        .main-card {
            background: white;
            border-radius: 1.5rem;
            padding: 1.2rem;
            box-shadow: var(--shadow);
            border: 1px solid rgba(0,0,0,0.02);
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .subject-tag {
            display: inline-block;
            background: #eff6ff;
            color: var(--primary);
            padding: 0.3rem 0.8rem;
            border-radius: 0.5rem;
            font-weight: 800;
            font-size: 0.75rem;
            margin-bottom: 0.8rem;
        }

        .date-banner {
            font-size: 1rem;
            font-weight: 800;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .timer-box {
            background: #fffbeb;
            border-radius: 1rem;
            padding: 0.75rem 1rem;
            margin-bottom: 1.25rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border: 1px solid #fef3c7;
        }

        .timer-icon {
            font-size: 1.2rem;
        }

        .timer-info .label { font-size: 0.65rem; color: #b45309; font-weight: 800; text-transform: uppercase; }
        .timer-info .value { font-size: 1.1rem; font-weight: 900; color: #d97706; font-family: 'Inter', sans-serif; }

        .lesson-item {
            background: #ffffff;
            border-radius: 1.2rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border: 1px solid #f1f5f9;
            transition: all 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.02);
        }

        .lesson-header {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.8rem;
        }

        .lesson-index {
            background: #f1f5f9;
            color: var(--primary);
            width: 28px; height: 28px;
            display: flex; align-items: center; justify-content: center;
            border-radius: 0.5rem;
            font-weight: 800;
            font-size: 0.8rem;
        }

        .lesson-name {
            font-weight: 700;
            font-size: 0.95rem;
            color: var(--text-main);
            line-height: 1.3;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.5rem;
        }

        .btn-action {
            padding: 0.7rem;
            border-radius: 0.8rem;
            text-decoration: none;
            font-weight: 700;
            font-size: 0.8rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            transition: all 0.2s;
        }

        .btn-notes { background: #0d9488; color: white; }
        .btn-exam { background: #2563eb; color: white; }
        
        .btn-locked { 
            background: #f8fafc; 
            color: #94a3b8; 
            border: 1px dashed #e2e8f0;
            cursor: not-allowed; 
        }

        .btn-action:not(.btn-locked):active { transform: scale(0.96); opacity: 0.9; }

        .closed-state {
            text-align: center;
            padding: 2rem 1rem;
        }

        .loader-container {
            height: 50vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        @media (max-width: 360px) {
            .user-greet h1 { font-size: 1.1rem; }
            .lesson-name { font-size: 0.85rem; }
        }
    </style>
</head>
<body>
    <div class="premium-bg"></div>
    
    <div class="container">
        <header>
            <div class="user-greet">
                <h1 id="greetName">வணக்கம்!</h1>
                <p id="topDate">ஏப்ரல் 29, 2026</p>
            </div>
            <div class="status-badge" id="liveBadge">LIVE</div>
        </header>

        <div id="mainDashboard">
            <div class="loader-container">
                <div class="pulse-loader"></div>
                <p style="margin-top: 1.5rem; font-weight: 600;">தயார் செய்கிறோம்...</p>
            </div>
        </div>
    </div>

    <script type="module">
        import { waitForAuth } from './js/auth.js?v=4.0';

        (async () => {
            const container = document.getElementById('mainDashboard');
            const user = await waitForAuth();
            
            if (user) {
                document.getElementById('greetName').innerText = `வணக்கம், ${user.name || "மாணவர்"}!`;
            }

            const v = Date.now();
            try {
                const res = await fetch('1.json?v=' + v);
                const data = await res.json();
                
                const now = new Date();
                const currentMins = now.getHours() * 60 + now.getMinutes();
                const isClosedTime = currentMins >= 1350 || currentMins < 360;

                // Update Date
                const dateStr = now.toLocaleDateString('ta-IN', { weekday: 'long', month: 'long', day: 'numeric' });
                document.getElementById('topDate').innerText = dateStr;

                if (isClosedTime || data.status === 'closed') {
                    renderClosed(now, currentMins);
                    return;
                }

                renderDashboard(data);

            } catch (err) {
                console.error(err);
                container.innerHTML = `<div class="main-card closed-state"><h3>பிழை!</h3><p>தகவல்களைப் பெறுவதில் சிக்கல். மீண்டும் முயற்சிக்கவும்.</p></div>`;
            }
        })();

        function renderDashboard(data) {
            const container = document.getElementById('mainDashboard');
            const titles = data.activeTitles || [];
            const subject = data.activeSubject || 'Unknown';
            const grade = data.activeGrade || '5';
            
            let isExamOpen = data.status === 'open';
            let isNotesOpen = data.status === 'notes' || data.status === 'open';

            let html = `
                <div class="main-card">
                    <div class="subject-tag">${subject} • வகுப்பு ${grade}</div>
                    <div class="date-banner">இன்றைய பாடங்கள்</div>
                    <p style="color: var(--text-muted); font-size: 0.9rem; margin: 0 0 1.5rem;">தினமும் காலை 6 மணிக்கு புதிய பாடங்கள் பதிவேற்றப்படும்.</p>

                    ${(isNotesOpen || isExamOpen) ? `
                        <div class="timer-box">
                            <div class="timer-icon">⏳</div>
                            <div class="timer-info">
                                <div class="label">முடிவடைய மீதமுள்ள நேரம்</div>
                                <div id="timerValue" class="value">--:--:--</div>
                            </div>
                        </div>
                    ` : ''}

                    <div class="lessons-list">
            `;

            titles.forEach((title, idx) => {
                const fileId = data.activeFiles[idx] || '1';
                const cGrade = (data.activeGrades && data.activeGrades[idx]) ? data.activeGrades[idx] : grade;
                
                html += `
                    <div class="lesson-item">
                        <div class="lesson-header">
                            <div class="lesson-index">${idx + 1}</div>
                            <div class="lesson-name">${title}</div>
                        </div>
                        <div class="action-grid">
                            ${isNotesOpen ? `
                                <a href="material.html?subject=${subject}&class=${cGrade}&lesson=${fileId}" class="btn-action btn-notes">
                                    📖 குறிப்புகள்
                                </a>
                            ` : `<div class="btn-action btn-locked">🔒 மூடியுள்ளது</div>`}

                            ${isExamOpen ? `
                                <a href="quiz.html?subject=${subject}&class=${cGrade}&lesson=${fileId}" class="btn-action btn-exam">
                                    📝 தேர்வு
                                </a>
                            ` : `<div class="btn-action btn-locked">🔒 இரவு 8:00</div>`}
                        </div>
                    </div>
                `;
            });

            html += `</div></div>`;
            container.innerHTML = html;

            startTimer();
        }

        function renderClosed(now, currentMins) {
            const container = document.getElementById('mainDashboard');
            const targetDate = new Date(now);
            if (currentMins >= 1350) targetDate.setDate(now.getDate() + 1);
            const targetStr = targetDate.toLocaleDateString('ta-IN', { weekday: 'long', month: 'long', day: 'numeric' });
            
            container.innerHTML = `
                <div class="main-card closed-state">
                    <div style="font-size: 4rem; margin-bottom: 1rem;">🌙</div>
                    <h2 style="color: var(--primary); margin-bottom: 1rem;">இன்றைய அமர்வு முடிந்தது</h2>
                    <p style="color: var(--text-muted); line-height: 1.6;">
                        தளம் தற்போது ஓய்வில் உள்ளது.<br>
                        <b>${targetStr} காலை 6:00 மணிக்கு</b> மீண்டும் திறக்கப்படும்.
                    </p>
                    <button onclick="location.reload()" style="margin-top: 2rem; padding: 0.8rem 2rem; border-radius: 1rem; border: none; background: var(--primary); color: white; font-weight: 700;">Refresh</button>
                </div>
            `;
        }

        function startTimer() {
            const el = document.getElementById('timerValue');
            if (!el) return;
            const update = () => {
                const now = new Date();
                const target = new Date();
                target.setHours(22, 30, 0, 0);
                const diff = target - now;
                if (diff <= 0) { el.innerText = "CLOSED"; return; }
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            };
            update();
            setInterval(update, 1000);
        }
    </script>
</body>
</html>
