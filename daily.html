<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A1 Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800;900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-light: #3b82f6;
            --accent: #f43f5e;
            --bg: #f1f5f9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --shadow: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            font-family: 'Outfit', sans-serif;
            margin: 0;
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
        }

        .header-section {
            background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%);
            color: white;
            padding: 0.75rem 1rem;
            border-bottom-left-radius: 1.25rem;
            border-bottom-right-radius: 1.25rem;
            box-shadow: 0 4px 15px rgba(30, 58, 138, 0.2);
            position: relative;
            z-index: 10;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-top h1 { font-size: 0.9rem; margin: 0; font-weight: 800; opacity: 0.9; }
        .date-chip { background: rgba(255,255,255,0.2); padding: 0.2rem 0.5rem; border-radius: 1rem; font-size: 0.65rem; font-weight: 700; }

        .header-greet { font-size: 1.2rem; font-weight: 900; margin: 0.4rem 0; }
        
        .special-exam-badge { 
            display: inline-flex; 
            align-items: center; 
            gap: 0.3rem; 
            background: var(--accent); 
            color: white; 
            padding: 0.25rem 0.6rem; 
            border-radius: 2rem; 
            font-size: 0.7rem; 
            font-weight: 800;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.03); } 100% { transform: scale(1); } }

        .scroll-container {
            height: calc(100vh - 120px);
            overflow-y: auto;
            padding: 0.6rem;
            scrollbar-width: none;
        }
        .scroll-container::-webkit-scrollbar { display: none; }

        .timer-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #fffbeb;
            border: 1px solid #fef3c7;
            padding: 0.4rem 0.75rem;
            border-radius: 0.6rem;
            margin-bottom: 0.6rem;
        }
        .timer-row .label { font-size: 0.6rem; color: #b45309; font-weight: 800; }
        .timer-row .value { font-size: 0.9rem; font-weight: 900; color: #d97706; }

        .lesson-tile {
            background: #ffffff;
            border-radius: 0.8rem;
            padding: 0.6rem;
            margin-bottom: 0.5rem;
            border: 1px solid #f1f5f9;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
        }

        .lesson-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .lesson-idx { background: #f1f5f9; color: var(--primary); width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 0.3rem; font-weight: 800; font-size: 0.7rem; }
        .lesson-name { font-weight: 700; font-size: 0.85rem; color: var(--text-main); flex: 1; line-height: 1.2; }

        .btn-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 0.35rem;
        }

        .btn-pill {
            padding: 0.5rem;
            border-radius: 0.6rem;
            text-decoration: none;
            font-weight: 800;
            font-size: 0.7rem;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.25rem;
            transition: all 0.2s;
        }

        .btn-notes { background: #0d9488; color: white; }
        .btn-exam { background: #2563eb; color: white; }
        .btn-locked { background: #f8fafc; color: #94a3b8; border: 1px dashed #e2e8f0; cursor: not-allowed; }

        .btn-pill:not(.btn-locked):active { transform: scale(0.96); opacity: 0.9; }

        .loader-wrap { height: 50vh; display: flex; align-items: center; justify-content: center; }
        .dot-loader { width: 10px; height: 10px; background: var(--primary); border-radius: 50%; animation: dotPulse 1s infinite alternate; }
        @keyframes dotPulse { from { transform: scale(0.5); opacity: 0.5; } to { transform: scale(1.5); opacity: 1; } }

        .subject-info { font-size: 0.65rem; font-weight: 800; color: var(--text-muted); margin: 0 0 0.4rem 0.2rem; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>
    <div class="header-section">
        <div class="header-top">
            <h1 id="headerTitle">இன்றைய தினசரித் தேர்வு</h1>
            <div class="date-chip" id="topDate">ஏப்ரல் 29</div>
        </div>
        <div class="header-greet" id="greetName">வணக்கம்!</div>
        <div class="special-exam-badge">🔥 இன்றைய சிறப்புத் தேர்வு</div>
    </div>
    
    <div class="scroll-container" id="mainDashboard">
        <div class="loader-wrap">
            <div class="dot-loader"></div>
        </div>
    </div>

    <script type="module">
        import { waitForAuth } from './js/auth.js?v=4.2';

        (async () => {
            const container = document.getElementById('mainDashboard');
            const user = await waitForAuth();
            if (user) document.getElementById('greetName').innerText = `வணக்கம், ${user.name || "மாணவர்"}!`;

            const v = Date.now();
            try {
                const res = await fetch('1.json?v=' + v);
                const data = await res.json();
                const now = new Date();
                const currentMins = now.getHours() * 60 + now.getMinutes();
                const isClosedTime = currentMins >= 1350 || currentMins < 360;

                document.getElementById('topDate').innerText = now.toLocaleDateString('ta-IN', { month: 'short', day: 'numeric' });

                if (isClosedTime || data.status === 'closed') {
                    renderClosed();
                } else {
                    renderDashboard(data);
                }
            } catch (err) {
                container.innerHTML = `<div class="lesson-tile" style="text-align:center;"><h3>பிழை!</h3><p>மீண்டும் முயற்சிக்கவும்.</p></div>`;
            }
        })();

        function renderDashboard(data) {
            const container = document.getElementById('mainDashboard');
            const titles = data.activeTitles || [];
            const subject = data.activeSubject || 'General';
            const grade = data.activeGrade || '5';
            
            const isExamOpen = data.status === 'open';
            const isNotesOpen = data.status === 'notes' || data.status === 'open';

            let html = `
                ${(isNotesOpen || isExamOpen) ? `
                    <div class="timer-row">
                        <div class="label">நேரம் முடிவடைய:</div>
                        <div id="timerValue" class="value">--:--:--</div>
                    </div>
                ` : ''}

                <div class="subject-info">பாடம்: ${subject} • வகுப்பு: ${grade}</div>
            `;

            titles.forEach((title, idx) => {
                const fileId = data.activeFiles[idx] || '1';
                const cGrade = (data.activeGrades && data.activeGrades[idx]) ? data.activeGrades[idx] : grade;
                
                html += `
                    <div class="lesson-tile">
                        <div class="lesson-info">
                            <div class="lesson-idx">${idx + 1}</div>
                            <div class="lesson-name">${title}</div>
                        </div>
                        <div class="btn-grid">
                            ${isNotesOpen ? `
                                <a href="material.html?subject=${subject}&class=${cGrade}&lesson=${fileId}" class="btn-pill btn-notes">📖 குறிப்புகள்</a>
                            ` : `<div class="btn-pill btn-locked">🔒 குறிப்புகள்</div>`}

                            ${isExamOpen ? `
                                <a href="quiz.html?subject=${subject}&class=${cGrade}&lesson=${fileId}" class="btn-pill btn-exam">📝 தேர்வு</a>
                            ` : `<div class="btn-pill btn-locked">🔒 இரவு 8 மணி</div>`}
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;
            startTimer();
        }

        function renderClosed() {
            const container = document.getElementById('mainDashboard');
            container.innerHTML = `<div class="lesson-tile" style="text-align:center; padding: 2rem;"><h2>நாளை காலை 6 மணிக்கு சந்திப்போம் 🌙</h2></div>`;
        }

        function startTimer() {
            const el = document.getElementById('timerValue');
            if (!el) return;
            const update = () => {
                const now = new Date();
                const target = new Date();
                target.setHours(22, 30, 0, 0);
                const diff = target - now;
                if (diff <= 0) { el.innerText = "CLOSED"; return; }
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                el.innerText = `${h}:${m}:${s}`;
            };
            update();
            setInterval(update, 1000);
        }
    </script>
</body>
</html>
