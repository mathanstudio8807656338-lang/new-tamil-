name: Daily Challenge - Evening Quiz (8PM IST)
on:
  schedule:
    - cron: '30 14 * * *'
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Open Today's Quiz
        env:
          AUTOMATIC_TOKEN: ${{ secrets.AUTOMATIC_TOKEN }}
        run: node scripts/daily_challenge/engine.js open

      - name: Commit & Push Tracker Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add scripts/daily_challenge/tracker.json
          git commit -m "chore: update lesson tracker [skip ci]" || echo "No changes to commit"
          git push origin main

