name: Daily Challenge - Night Close (10:30 PM IST)
on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  run-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Close All Content
        env:
          AUTOMATIC_TOKEN: ${{ secrets.AUTOMATIC_TOKEN }}
        run: node scripts/daily_challenge/engine.js close

      - name: Commit & Push Update
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add 1.json scripts/daily_challenge/tracker.json
          git commit -m "chore: night close session [skip ci]" || echo "No changes to commit"
          git push origin main

