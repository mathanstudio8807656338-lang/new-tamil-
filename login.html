<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A1 Coaching - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-soft: #eff6ff;
            --accent: #f43f5e;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #eff6ff, #f8fafc);
            margin: 0;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden; /* No scrolling */
        }

        .login-card {
            background: white;
            width: 90%;
            max-width: 340px;
            padding: 1.5rem;
            border-radius: 1.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.05);
            border: 1px solid #f1f5f9;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .logo-box { margin-bottom: 1rem; }
        .logo-box h1 { font-size: 1.2rem; margin: 0; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
        .logo-box p { font-size: 0.65rem; margin: 0; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .form-group { text-align: left; margin-bottom: 0.75rem; }
        .form-group label { display: block; font-size: 0.7rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.3rem; text-transform: uppercase; }

        .input-group { display: flex; gap: 0.4rem; }
        .prefix { padding: 0.6rem 0.75rem; background: #f1f5f9; border: 1.5px solid #f1f5f9; border-radius: 0.75rem; font-size: 0.85rem; font-weight: 800; color: var(--primary); }
        .form-control { 
            width: 100%; padding: 0.6rem 1rem; border-radius: 0.75rem; border: 1.5px solid #f1f5f9; 
            font-size: 0.9rem; font-weight: 700; color: var(--text-main); outline: none; transition: 0.2s;
            background: #f8fafc;
        }
        .form-control:focus { border-color: var(--primary); background: white; }

        .btn {
            width: 100%; padding: 0.75rem; border-radius: 1rem; border: none; 
            font-size: 0.85rem; font-weight: 900; cursor: pointer; transition: 0.2s; margin-top: 0.5rem;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2); }
        .btn-outline { background: white; border: 1.5px solid #e2e8f0; color: var(--text-muted); font-size: 0.75rem; }
        .btn-free { background: #fff1f2; border: 1.5px solid #fecaca; color: var(--accent); margin-top: 1rem; }

        .error-message { color: var(--accent); font-size: 0.65rem; font-weight: 700; margin-top: 0.4rem; display: none; }

        .footer-text { font-size: 0.6rem; color: var(--text-muted); font-weight: 600; margin-top: 1.25rem; opacity: 0.7; }

        /* Step Transitions */
        .step { display: none; }
        .step.active { display: block; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <h1>A1 COACHING</h1>
            <p>Primary Student Dashboard</p>
        </div>

        <div id="step1" class="step active">
            <form id="phoneForm">
                <div class="form-group">
                    <label>Phone Number</label>
                    <div class="input-group">
                        <span class="prefix">+91</span>
                        <input type="tel" id="phoneNumber" class="form-control" placeholder="10 Digits" required pattern="[0-9]{10}" maxlength="10">
                    </div>
                </div>
                <div id="recaptcha-container"></div>
                <button type="submit" class="btn btn-primary">CONTINUE</button>
                
                <button type="button" id="switchToFree" class="btn btn-free">FREE ENTRANCE (இலவசப் பயிற்சி)</button>
                <div id="phoneError" class="error-message">சரியான எண்ணை உள்ளிடவும்!</div>
            </form>
        </div>

        <div id="stepFree" class="step">
            <form id="freeForm">
                <div class="form-group">
                    <label>Full Name (பெயர்)</label>
                    <input type="text" id="freeName" class="form-control" placeholder="பெயர்..." required>
                </div>
                <div class="form-group">
                    <label>Mobile Number</label>
                    <input type="tel" id="freePhone" class="form-control" placeholder="10 Digits" maxlength="10" required>
                </div>
                <button type="submit" class="btn btn-primary">START EXAM</button>
                <button type="button" class="btn btn-outline backToStep1">BACK</button>
            </form>
        </div>

        <div id="step2" class="step">
            <form id="pinForm">
                <div class="form-group">
                    <label>6-Digit Password</label>
                    <input type="text" id="pinCode" class="form-control" placeholder="A1B2C3" required maxlength="6" style="text-align:center; letter-spacing:0.4em; font-size:1.1rem;">
                </div>
                <button type="submit" class="btn btn-primary">LOGIN</button>
                <button type="button" id="backBtn" class="btn btn-outline">CHANGE NUMBER</button>
                <div id="pinError" class="error-message">தவறான பாஸ்வேர்டு!</div>
            </form>
        </div>

        <div class="footer-text">
            © A1 Tamil Primary Edition<br>Contact: 6369371452
        </div>
    </div>

    <script type="module" src="js/auth.js?v=5.0"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('key') === 'A1FREE') {
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            document.getElementById('stepFree').classList.add('active');
        }

        // Simple step switcher for UI demo (auth.js handles real logic)
        document.querySelectorAll('.backToStep1').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
                document.getElementById('step1').classList.add('active');
            };
        });
    </script>
</body>
</html>
