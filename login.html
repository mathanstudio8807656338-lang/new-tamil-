<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>A1 Coaching - Quick Entry</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-soft: #eff6ff;
            --accent: #f43f5e;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: radial-gradient(circle at top right, #eff6ff, #f8fafc);
            margin: 0;
            color: var(--text-main);
            font-family: 'Outfit', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .login-card {
            background: white;
            width: 95%;
            max-width: 380px;
            padding: 1.75rem;
            border-radius: 2rem;
            box-shadow: 0 25px 60px rgba(0,0,0,0.08);
            border: 1px solid #f1f5f9;
            text-align: center;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp { from { transform: translateY(15px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .logo-box { margin-bottom: 1.5rem; }
        .logo-box h1 { font-size: 1.4rem; margin: 0; font-weight: 900; color: var(--primary); letter-spacing: -0.5px; }
        .logo-box p { font-size: 0.8rem; margin: 0.2rem 0 0; font-weight: 800; color: #ddb70e; letter-spacing: 1px; }
        .logo-box span { font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-top: 0.3rem; display: block; }

        .form-group { text-align: left; margin-bottom: 0.8rem; }
        .form-group label { display: block; font-size: 0.75rem; font-weight: 800; color: var(--text-muted); margin-bottom: 0.3rem; text-transform: uppercase; }

        .form-control { 
            width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem; border: 1.5px solid #f1f5f9; 
            font-size: 1rem; font-weight: 700; color: var(--text-main); outline: none; transition: 0.2s;
            background: #f8fafc;
        }
        .form-control:focus { border-color: var(--primary); background: white; }

        .btn {
            width: 100%; padding: 0.85rem; border-radius: 1rem; border: none; 
            font-size: 0.95rem; font-weight: 900; cursor: pointer; transition: 0.2s; margin-top: 0.5rem;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--primary); color: white; box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2); }
        
        .footer-links {
            margin-top: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }
        .link-btn {
            background: #f1f5f9;
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 0.75rem;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            border: 1px solid #e2e8f0;
        }
        .link-btn.wa { background: #dcfce7; color: #166534; border-color: #bbf7d0; }
        .link-btn.paid { background: #fff1f2; color: #9f1239; border-color: #fecaca; }

        .footer-text { font-size: 0.65rem; color: var(--text-muted); font-weight: 700; margin-top: 1.25rem; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-box">
            <h1>A1 ONLINE COACHING CENTRE</h1>
            <p>📞 6369371452</p>
            <span>Primary Student Dashboard</span>
        </div>

        <form id="freeForm">
            <div class="form-group">
                <label>உங்கள் பெயர் (Full Name)</label>
                <input type="text" id="freeName" class="form-control" placeholder="பெயர்..." required>
            </div>
            <div class="form-group">
                <label>மொபைல் எண் (Mobile No)</label>
                <input type="tel" id="freePhone" class="form-control" placeholder="10 Digits" maxlength="10" required>
            </div>
            <button type="submit" id="freeBtn" class="btn btn-primary">
                <span id="freeBtnText">தேர்வைத் தொடங்க (START)</span>
                <div id="freeLoader" style="display:none; width: 20px; height: 20px; border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid white; border-radius: 50%; animation: spin 1s linear infinite;"></div>
            </button>
        </form>

        <div class="footer-links">
            <a href="https://wa.me/916369371452?text=Paid Group-ல் இணைய விரும்புகிறேன்" target="_blank" class="link-btn paid">
                💎 PAID GROUP-ல் இணைய
            </a>
            <a href="https://chat.whatsapp.com/KDL9niBSU6t0Nx1wlBtpJy" target="_blank" class="link-btn wa">
                📱 வாட்ஸ்அப் குழுவில் இணைய
            </a>
        </div>

        <div class="footer-text">© A1 Tamil Primary Edition</div>
    </div>

    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
    <script type="module" src="js/auth.js?v=13.0"></script>
</body>
</html>
