<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quiz - A1 Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Noto+Sans+Tamil:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="js/auth.js" type="module"></script>
    <style>
        :root {
            --primary: #1e3a8a;
            --primary-soft: #eff6ff;
            --accent: #f43f5e;
            --bg: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --success: #10b981;
            --danger: #ef4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            margin: 0;
            color: var(--text-main);
            font-family: 'Outfit', 'Noto Sans Tamil', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Compact Top Nav */
        nav {
            background: white;
            padding: 0.5rem 1rem;
            display: flex;
            align-items: center;
            border-bottom: 1px solid #f1f5f9;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .back-link { color: var(--text-main); margin-right: 0.75rem; display: flex; align-items: center; text-decoration: none; }
        .nav-logo h1 { font-size: 0.85rem; margin: 0; font-weight: 900; color: var(--primary); }
        .nav-logo span { font-size: 0.5rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        /* Quiz Header */
        .quiz-header {
            background: white;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            text-align: center;
        }
        #lessonTitle { font-size: 0.95rem; font-weight: 900; color: var(--primary); margin: 0; line-height: 1.3; }
        .progress-chip {
            display: inline-block;
            background: var(--primary-soft);
            color: var(--primary);
            padding: 0.2rem 0.6rem;
            border-radius: 1rem;
            font-size: 0.6rem;
            font-weight: 800;
            margin-top: 0.4rem;
        }

        /* Question Area */
        .quiz-container {
            flex: 1;
            padding: 0.75rem;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .question-card {
            background: white;
            border-radius: 1rem;
            padding: 1rem;
            margin-bottom: 0.75rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid #f1f5f9;
            border-left: 4px solid var(--primary);
        }

        .q-text { font-size: 0.9rem; font-weight: 800; color: var(--text-main); margin-bottom: 0.85rem; line-height: 1.4; }
        
        .options-grid { display: grid; gap: 0.5rem; }
        .option-item {
            padding: 0.75rem 1rem;
            background: #f8fafc;
            border: 1.5px solid #f1f5f9;
            border-radius: 0.75rem;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            display: flex; align-items: center; gap: 0.75rem;
        }
        .option-item:active { transform: scale(0.98); }
        .option-item.correct { background: #ecfdf5; border-color: var(--success); color: #065f46; }
        .option-item.wrong { background: #fef2f2; border-color: var(--danger); color: #991b1b; }
        .option-item.selected { border-color: var(--primary); }

        .locked { pointer-events: none; }

        /* Submit Button */
        .footer-action {
            padding: 1rem;
            background: white;
            border-top: 1px solid #f1f5f9;
            position: sticky;
            bottom: 0;
            display: flex; justify-content: center;
        }
        .btn-submit {
            background: var(--primary);
            color: white;
            padding: 0.75rem 2rem;
            border-radius: 2rem;
            border: none;
            font-size: 0.9rem;
            font-weight: 800;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 10px 20px rgba(30, 58, 138, 0.2);
        }

        /* Result Popup */
        .modal-overlay {
            display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(4px); z-index: 2000; align-items: center; justify-content: center; padding: 1.5rem;
        }
        .result-card {
            background: white; padding: 2rem; border-radius: 1.5rem; width: 100%; max-width: 350px;
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            animation: pop 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes pop { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .score-box { font-size: 3rem; font-weight: 900; color: var(--primary); margin: 1rem 0; }
        .result-msg { font-size: 0.9rem; font-weight: 700; color: var(--text-muted); margin-bottom: 1.5rem; }

        .btn-p { background: var(--primary); color: white; padding: 0.7rem 1.5rem; border-radius: 1rem; border: none; font-weight: 800; width: 100%; margin-bottom: 0.5rem; cursor: pointer; }
        .btn-o { background: transparent; color: var(--text-muted); padding: 0.5rem; border: none; font-weight: 700; cursor: pointer; }

        /* Name Prompt */
        .name-modal {
            position: fixed; inset: 0; background: white; z-index: 3000;
            display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
        }
        .name-modal h2 { font-size: 1.2rem; font-weight: 900; margin-bottom: 0.5rem; }
        .name-input {
            width: 100%; max-width: 300px; padding: 0.85rem; border-radius: 1rem;
            border: 2px solid #f1f5f9; font-size: 1rem; font-weight: 700; text-align: center; margin-bottom: 1.5rem; outline: none;
        }
        .name-input:focus { border-color: var(--primary); }

        /* Loading */
        #loading {
            position: fixed; inset: 0; background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 4000;
        }
        .spinner { width: 30px; height: 30px; border: 3px solid #f1f5f9; border-top-color: var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Lang classes */
        .lang-sep { display: inline; opacity: 0.3; margin: 0 0.3rem; }
        body.lang-en .tm-text, body.lang-en .lang-sep { display: none !important; }
        body.lang-tm .en-text, body.lang-tm .lang-sep { display: none !important; }
    </style>
</head>
<body class="lang-en">
    <div id="loading">
        <div class="spinner"></div>
        <p style="font-size: 0.7rem; font-weight: 700; margin-top: 0.75rem; color: var(--text-muted);">தேர்வு தயாராகிறது...</p>
    </div>

    <div id="namePrompt" class="name-modal">
        <img src="images/logo.png" style="height: 50px; margin-bottom: 1.5rem;">
        <h2>தேர்வைத் தொடங்கவும்</h2>
        <p style="font-size: 0.75rem; font-weight: 700; color: var(--text-muted); margin-bottom: 1.5rem;">உங்கள் பெயரை உள்ளிடவும் (Enter Name)</p>
        <input type="text" id="userNameInput" class="name-input" placeholder="பெயர்...">
        <button id="startQuizBtn" class="btn-p">START TEST</button>
    </div>

    <nav>
        <a href="daily.html" class="back-link">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
        </a>
        <div class="nav-logo">
            <h1>A1 TAMIL</h1>
            <span>Primary Edition</span>
        </div>
    </nav>

    <div class="quiz-header">
        <h2 id="lessonTitle">ஆன்லைன் தேர்வு</h2>
        <div class="progress-chip">Total Questions: <span id="totalQ">0</span></div>
    </div>

    <div class="quiz-container" id="questionContainer">
        <!-- Questions injected here -->
    </div>

    <div class="footer-action">
        <button id="finalSubmitBtn" class="btn-submit">SUBMIT TEST</button>
    </div>

    <div class="modal-overlay" id="resultOverlay">
        <div class="result-card">
            <h2 id="resName" style="font-size: 1rem; margin: 0; color: var(--text-muted);">NAME</h2>
            <div class="score-box" id="finalScore">0/0</div>
            <p id="resLesson" style="font-size: 0.8rem; font-weight: 800; color: var(--primary); margin-bottom: 0.5rem;"></p>
            <p class="result-msg" id="resultMsg">Good Job!</p>
            <button onclick="location.reload()" class="btn-p">RETRY</button>
            <button onclick="history.back()" class="btn-o">CLOSE</button>
        </div>
    </div>

    <script type="module">
        (async () => {
            const v = Date.now();
            const { getLocalLessonData } = await import(`./js/fetchData.js?v=${v}`);

            const params = new URLSearchParams(window.location.search);
            const subject = params.get('subject');
            const className = params.get('class');
            const lessonId = params.get('lesson');

            let questions = [];
            let answers = {};
            let lessonTitle = "";

            async function init() {
                try {
                    const result = await getLocalLessonData(subject, className, lessonId);
                    if (!result || !result.data) throw new Error("No data");

                    const data = result.data;
                    lessonTitle = data.title || (data.lesson_meta ? data.lesson_meta.title : 'Quiz');
                    questions = data.quiz ? (data.quiz.questions || (Array.isArray(data.quiz) ? data.quiz : [])) : (data.questions || []);

                    document.getElementById('lessonTitle').innerText = lessonTitle;
                    document.getElementById('totalQ').innerText = questions.length;

                    renderQuestions();
                } catch (e) {
                    alert("Error: " + e.message);
                } finally {
                    document.getElementById('loading').style.display = 'none';
                }
            }

            function renderQuestions() {
                const container = document.getElementById('questionContainer');
                container.innerHTML = questions.map((q, idx) => `
                    <div class="question-card">
                        <div class="q-text"><strong>${idx + 1}.</strong> ${formatText(q.question || q.q)}</div>
                        <div class="options-grid" id="options-${idx}">
                            ${q.options.map((opt, oIdx) => `
                                <div class="option-item" onclick="handleSelect(${idx}, ${oIdx}, this)">
                                    ${formatText(opt)}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            }

            window.handleSelect = (qIdx, oIdx, el) => {
                const grid = document.getElementById(`options-${qIdx}`);
                if (grid.classList.contains('locked')) return;

                const q = questions[qIdx];
                const correctIdx = q.answer !== undefined ? q.answer : q.a;
                answers[qIdx] = oIdx;

                const items = grid.querySelectorAll('.option-item');
                items.forEach(it => it.classList.remove('selected'));
                el.classList.add('selected');

                // Instant Feedback
                if (oIdx === correctIdx) el.classList.add('correct');
                else {
                    el.classList.add('wrong');
                    if (items[correctIdx]) items[correctIdx].classList.add('correct');
                }
                grid.classList.add('locked');
            };

            function formatText(text) {
                if (!text) return "";
                let html = text.toString().replace(/\|\|/g, ' / ');
                if (html.includes(' / ')) {
                    const parts = html.split(' / ');
                    return `<span class="en-text">${parts[0]}</span><span class="lang-sep">/</span><span class="tm-text">${parts[1]}</span>`;
                }
                return html;
            }

            document.getElementById('startQuizBtn').onclick = () => {
                const name = document.getElementById('userNameInput').value.trim();
                if (!name) { alert("Please enter name!"); return; }
                document.getElementById('namePrompt').style.display = 'none';
                document.getElementById('resName').innerText = name;
            };

            document.getElementById('finalSubmitBtn').onclick = () => {
                let score = 0;
                questions.forEach((q, idx) => {
                    if (answers[idx] === (q.answer !== undefined ? q.answer : q.a)) score++;
                });

                document.getElementById('finalScore').innerText = `${score}/${questions.length}`;
                document.getElementById('resLesson').innerText = lessonTitle;
                const pct = (score / questions.length) * 100;
                document.getElementById('resultMsg').innerText = pct >= 80 ? "Excellent!" : pct >= 50 ? "Good Job!" : "Keep Practicing!";
                document.getElementById('resultOverlay').style.display = 'flex';
            };

            init();
        })();
    </script>
</body>
</html>
